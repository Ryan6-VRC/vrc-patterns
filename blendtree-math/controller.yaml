# blendtree-math — the Direct-Blend-Tree math idiom catalog. Every DBT math primitive an agent reaches
# for when a gimmick needs arithmetic on animator floats with no scripted behaviour: add (two idioms),
# subtract, multiply, divide, negate/remap, clamp, the composed min/max, the smoothing family, and an
# owned frametime rig. Generalized from standard VRChat DBT-math constructions (vrc.school Advanced Blend
# Trees); no real-avatar naming.
#
# STRUCTURE — four concern-layers, each an always-on WD-ON Direct root state whose named children are the
# idioms of that concern (Arithmetic, MinMax, Smoothing, FrameTime). Layers are author-time legibility
# only — open one blend tree, read one concern — an optimizer merges them all into one DBT regardless
# (README; docs/gimmicks.md "Layers are author-time legibility, not runtime structure"). Named tree nodes
# and value-named clips make each graph self-describing in the Animator window.
#
# WD-ON: every state is Write-Defaults ON and carries "(WD ON)" in its name (vrc.school's caution — a
# Direct-tree AAP write with WD off leaves the param undriven the instant the state loses full weight).
# Inputs are plain floats (drivable); every computed value is aap:true — a bare declared-param clip write
# compiles to an animator-parameter curve, no scene binding needed.
#
# THE ONE HARD CONSTRAINT threading all of this: a parameter used AS a Direct-tree directWeight is clamped
# to >=0 by Unity — only a clip's authored curve VALUE (set:) may carry a negative sign. So A/B and the
# genuine clamp0 outputs (MaxRelu, MinRelu) stay >=0 by construction and are reused as weights; a genuinely
# signed intermediate (MaxDiff, MinDiff, LinDelta) is read back through a 1D tree instead (a 1D tree's
# blend PARAMETER, unlike a Direct weight, is never clamped), and is never itself used as a directWeight.
# `One` is a constant (never driven) full-weight helper: it carries every concern-node at weight 1 in its
# layer's root Direct tree, drives the 1D-identity-pass shape, and doubles as the divide idiom's weight-1
# numerator.
#
# SAME-FRAME vs SETTLE. The arithmetic primitives are single-hop — each output is computed same-frame from
# A/B (or RemapIn/ClampIn/DivInput) with no intermediate AAP, so it is exact the frame its inputs change.
# min/max are DERIVED, not primitive: max(a,b) = b + clamp0(a-b), min(a,b) = b - clamp0(b-a), where clamp0
# = clamp to [0,+inf) (ReLU). Their three stages (diff -> relu -> recombine) are siblings in one tree, each
# reading the prior stage's AAP at FRAME START (last frame's write) — the chain therefore SETTLES ~3 frames
# after an input change (steady-state exact; README records the per-frame column). This settle is intrinsic:
# one frame per AAP hop, independent of layer structure or optimization — the same stages authored as
# ordered layers would settle identically. The reused ReLU stage is the clamp-shaped 1D (threshold 0->0,
# 1->1), which on a bounded [-1,1] difference domain is exactly clamp-to-[0,+inf).
#
# ADD — the one primitive shown two ways, side by side. `Add (Direct child)` writes SumDirect (higher
# precision, positive-only — A/B are raw directWeights); `Add (1D child)` writes Sum1D (each input identity-
# mapped through its own 1D tree; lower precision — its [0,1] thresholds clamp a negative input to 0, so a
# signed input would need signed thresholds like Negate/Remap's). They write DISTINCT AAPs, so both run
# live and are directly comparable in one graph — there is no longer any "don't wire both" caveat.
#
# LINEAR SMOOTHING LIMIT-CYCLES (known, inherent — see README): its step needs a computed delta
# (LinTarget - SmoothedLin) that can't be same-frame as the step consuming it, so a 1-frame feedback delay
# makes SmoothedLin oscillate by +-one step around the target. Near a ZERO target that dip goes slightly
# negative; this idiom, for simplicity, still uses SmoothedLin as a directWeight (the carry + the delta's
# neg term), so Unity clamps the dip to 0 and the low end distorts — SmoothedLin is therefore NOT a
# safe-as-weight >=0 intermediate, and the up-ramp proof doesn't exercise this. The exponential smoother
# has none of it: it feeds SmoothedExp/SmoothTarget directly as blend params, no computed intermediate, no
# signed feedback. (Nesting Exponential and Linear as siblings under one Smoothing root changes neither —
# each only reads its own output, the intended 1-frame recurrence.)
#
# FRAMETIME rig — OWNED here, not borrowed from VRCFury's FrameTimeService (see README): a `tangents:
# linear` ramp makes the `Time` AAP equal elapsed seconds (flat tangents would stair-step it — most frames
# read Delta=0, spiking at key boundaries). `Time_Ramp` and the `FrameTime = Time - LastTime` calc are now
# siblings in one tree, so the calc reads `Time` at frame start (one-frame-old dt) and stages LastTime =
# Time — still exactly dt for a steady frame rate. Multiply FrameTime into a smoothing step (via the
# multiply idiom) to make that step frame-rate independent.

schema: 1
controller: BlendtreeMath_Fx
basis: avatar-root
role: fx

defaults:
  writeDefaults: on
  transition: { duration: 0, exitTime: none, interruption: none }

parameters:
  # shared generic inputs. A/B live in [0,1] and are used as Direct-tree weights below, so must stay >=0.
  A:   { type: float, default: 0.0 }
  B:   { type: float, default: 0.0 }
  One: { type: float, default: 1.0 }   # constant, never driven — carries every concern-node at full weight, the 1D-identity shape, and the divide numerator

  # add — two idioms, DISTINCT outputs (both live, comparable)
  SumDirect: { type: float, aap: true }   # Add (Direct child) = A + B
  Sum1D:     { type: float, aap: true }   # Add (1D child)     = A + B

  # subtract / multiply
  DiffOut: { type: float, aap: true }
  ProdOut: { type: float, aap: true }     # positive-only: A, B must stay >=0

  # negate/remap
  RemapIn: { type: float, default: 0.0 }  # working range [-1, 1]
  NegOut:  { type: float, aap: true }

  # clamp
  ClampIn:  { type: float, default: 0.0 } # any range; saturates to [0, 1] outside it
  ClampOut: { type: float, aap: true }

  # divide (Normalize Blend Values) — divides by (1 + DivInput), not DivInput; see the Divide node comment
  DivInput: { type: float, default: 0.0 } # >=0 (used as a Direct weight)
  DivOut:   { type: float, aap: true }
  DivDummy: { type: float, aap: true }     # throwaway — animates nothing; exists only to inflate the pre-normalize weight sum

  # min/max — composed/derived (see the MinMax layer), with intermediate AAPs; settles ~3 frames (header)
  MaxDiff: { type: float, aap: true }   # signed (A - B); read back via a 1D tree, never used as a weight
  MaxRelu: { type: float, aap: true }   # >=0 by construction — safe to use as a weight downstream
  MaxOut:  { type: float, aap: true }
  MinDiff: { type: float, aap: true }   # signed (B - A); read back via a 1D tree, never used as a weight
  MinRelu: { type: float, aap: true }   # >=0 by construction — safe to use as a weight downstream
  MinOut:  { type: float, aap: true }

  # exponential smoothing (mirrors the smoother fixture; docs/gimmicks.md "AAP exponential smoother")
  SmoothTarget: { type: float, default: 0.0 }
  ExpKeep:      { type: float, default: 0.9 }   # lambda: fraction of the OLD value kept per frame
  ExpMix:       { type: float, default: 0.1 }   # 1 - lambda: fraction of the NEW target mixed in
  SmoothedExp:  { type: float, aap: true }

  # linear smoothing
  LinTarget:   { type: float, default: 0.0 }
  LinDelta:    { type: float, aap: true }   # LinTarget - SmoothedLin, computed in-tree; read as the step 1D's blend param (never a weight)
  SmoothedLin: { type: float, aap: true }   # the smoothed output (tracks LinTarget)

  # frametime rig — owned (README: VRCFury-borrow is a deliberate non-default choice, not the shipped behavior)
  Time:      { type: float, aap: true }
  LastTime:  { type: float, aap: true }
  FrameTime: { type: float, aap: true }

layers:
  # ===== Arithmetic — the single-hop primitives, one named node each (all exact same-frame) =====
  - name: Math/Arithmetic
    states:
      "Arithmetic (WD ON)":
        motion:
          tree: direct
          name: Arithmetic
          children:
            # Add (Direct child): SumDirect = A + B. Higher precision, any positive number — but A/B are
            # raw directWeights, so both must stay >=0 (Unity clamps a child's weight to >=0).
            - tree: direct
              name: "Add (Direct child)"
              directWeight: One
              children:
                - { clip: SumDirect_One, directWeight: A }
                - { clip: SumDirect_One, directWeight: B }
            # Add (1D child): each input is identity-mapped 0..1 through its own 1D tree (full weight via
            # One), and the two sub-trees stack (a Direct tree sums its children) → Sum1D = A + B. Lower
            # precision; the [0,1] thresholds clamp a negative input to 0 (A=-0.5 reads 0). Writes a
            # DISTINCT AAP from Add (Direct child), so both run live and are comparable side by side.
            - tree: direct
              name: "Add (1D child)"
              directWeight: One
              children:
                - tree: 1d
                  name: "A identity"
                  param: A
                  directWeight: One
                  children:
                    - { clip: Sum1D_Zero, threshold: 0.0 }
                    - { clip: Sum1D_One,  threshold: 1.0 }
                - tree: 1d
                  name: "B identity"
                  param: B
                  directWeight: One
                  children:
                    - { clip: Sum1D_Zero, threshold: 0.0 }
                    - { clip: Sum1D_One,  threshold: 1.0 }
            # Subtract: DiffOut = A - B. The sign lives in the clip's curve value (Diff_Neg = -1), not in
            # the weight, so A/B stay >=0 as directWeights — no positive-only caveat.
            - tree: direct
              name: Subtract
              directWeight: One
              children:
                - { clip: Diff_Pos, directWeight: A }
                - { clip: Diff_Neg, directWeight: B }
            # Multiply: nested Direct trees. The inner tree's single child is scaled by B, then the whole
            # inner tree (worth B) is scaled by the outer directWeight A → ProdOut = A * B. Positive-only:
            # both A and B are raw directWeights.
            - tree: direct
              name: Multiply
              directWeight: One
              children:
                - tree: direct
                  name: "scale by A"
                  directWeight: A
                  children:
                    - { clip: Prod_One, directWeight: B }
            # Divide (Normalize Blend Values): once the raw weight sum exceeds 1, every child's weight is
            # divided by that sum. Div_Dummy (weight DivInput, animates nothing) inflates the sum;
            # Div_One (weight One=1) carries the output. Sum = DivInput + 1 → DivOut = 1 / (DivInput + 1) —
            # this divides by (1 + DivInput), NOT DivInput (the vrc.school caveat).
            - tree: direct
              name: Divide
              directWeight: One
              normalized: true
              children:
                - { clip: Div_Dummy, directWeight: DivInput }
                - { clip: Div_One,   directWeight: One }
            # Negate/Remap: a 1D tree's own clamp-and-lerp (Blend(f<=min)=A, Blend(f>=max)=B, lerp between)
            # IS the remap. Here [-1,1] -> [1,-1] (negation); any [inMin,inMax] -> [outAtMin,outAtMax]
            # follows the same two-threshold shape with different clip constants.
            - tree: 1d
              name: "Negate/Remap"
              param: RemapIn
              directWeight: One
              children:
                - { clip: Neg_Pos, threshold: -1.0 }
                - { clip: Neg_Neg, threshold: 1.0 }
            # Clamp: 1D natural saturation — below threshold 0 the tree holds ClampOut at 0, above 1 it
            # holds 1, identity between → clamps ClampIn to [0,1]. This exact shape (0 at the low
            # threshold, 1 at the high) is the ReLU stage reused in MinMax below.
            - tree: 1d
              name: Clamp
              param: ClampIn
              directWeight: One
              children:
                - { clip: Clamp_Zero, threshold: 0.0 }
                - { clip: Clamp_One,  threshold: 1.0 }
    default: "Arithmetic (WD ON)"

  # ===== MinMax — DERIVED, not primitive; three stages per node are siblings → ~3-frame settle (header) =====
  - name: Math/MinMax
    states:
      "MinMax (WD ON)":
        motion:
          tree: direct
          name: MinMax
          children:
            - tree: direct
              name: Max
              directWeight: One
              children:
                # stage 1 (subtract idiom): MaxDiff = A - B (signed; not used as a weight downstream)
                - tree: direct
                  name: "A−B"
                  directWeight: One
                  children:
                    - { clip: MaxDiff_Pos, directWeight: A }
                    - { clip: MaxDiff_Neg, directWeight: B }
                # stage 2 (clamp-shaped 1D, reused): MaxRelu = clamp0(MaxDiff). Reading MaxDiff through the
                # 1D's PARAM (not a weight) is exactly why the signed intermediate is safe here.
                - tree: 1d
                  name: ReLU
                  param: MaxDiff
                  directWeight: One
                  children:
                    - { clip: MaxRelu_Zero, threshold: 0.0 }
                    - { clip: MaxRelu_One,  threshold: 1.0 }
                # stage 3 (add idiom): MaxOut = B + MaxRelu. Both >=0 by construction, so both are safe as
                # directWeights.
                - tree: direct
                  name: "b + ReLU(a−b)"
                  directWeight: One
                  children:
                    - { clip: MaxOut_One, directWeight: B }
                    - { clip: MaxOut_One, directWeight: MaxRelu }
            - tree: direct
              name: Min
              directWeight: One
              children:
                # stage 1 (subtract idiom): MinDiff = B - A (signed; not used as a weight downstream)
                - tree: direct
                  name: "B−A"
                  directWeight: One
                  children:
                    - { clip: MinDiff_Pos, directWeight: B }
                    - { clip: MinDiff_Neg, directWeight: A }
                # stage 2 (clamp-shaped 1D, reused): MinRelu = clamp0(MinDiff)
                - tree: 1d
                  name: ReLU
                  param: MinDiff
                  directWeight: One
                  children:
                    - { clip: MinRelu_Zero, threshold: 0.0 }
                    - { clip: MinRelu_One,  threshold: 1.0 }
                # stage 3 (subtract idiom): MinOut = B - MinRelu. Both >=0, so the sign lives in
                # MinOut_Neg's clip value, same as the canonical Subtract node.
                - tree: direct
                  name: "b − ReLU(b−a)"
                  directWeight: One
                  children:
                    - { clip: MinOut_Pos, directWeight: B }
                    - { clip: MinOut_Neg, directWeight: MinRelu }
    default: "MinMax (WD ON)"

  # ===== Smoothing — exponential (settles) vs linear (limit-cycles); siblings, independent (header) =====
  - name: Math/Smoothing
    states:
      "Smoothing (WD ON)":
        motion:
          tree: direct
          name: Smoothing
          children:
            # Exponential: SmoothedExp_next = ExpKeep * SmoothedExp + ExpMix * SmoothTarget, ExpMix =
            # 1 - ExpKeep. Framerate-dependent by design (docs/gimmicks.md) — see FrameTime to compensate.
            - tree: direct
              name: Exponential
              directWeight: One
              children:
                - tree: 1d
                  name: "keep old"
                  param: SmoothedExp
                  directWeight: ExpKeep
                  children:
                    - { clip: ExpSm_Zero, threshold: 0.0 }
                    - { clip: ExpSm_One,  threshold: 1.0 }
                - tree: 1d
                  name: "mix new"
                  param: SmoothTarget
                  directWeight: ExpMix
                  children:
                    - { clip: ExpSm_Zero, threshold: 0.0 }
                    - { clip: ExpSm_One,  threshold: 1.0 }
            # Linear (vrc.school canonical single Direct tree): compute LinDelta = LinTarget - SmoothedLin
            # (two stacked writes) AND apply SmoothedLin += clamp(LinDelta, -0.1, +0.1) (a self-weighted
            # carry + a full-weight clamped-step 1D over LinDelta). The step 1D's keys (-0.1,-0.1)/(0.1,0.1)
            # form the line through (0,0): identity inside [-0.1,0.1], saturating to +-0.1 outside — that
            # IS the clamp. It reads LinDelta at FRAME START, one frame stale, so it limit-cycles by
            # +-one step near the target (README). 0.1 is a compile-time step; scale a normalized
            # clamp(-1,1) by a live StepSize (via multiply) or by FrameTime to tune / frame-rate-normalize.
            - tree: direct
              name: Linear
              directWeight: One
              children:
                - { clip: LinDelta_Pos, directWeight: LinTarget }    # LinDelta += LinTarget * 1
                - { clip: LinDelta_Neg, directWeight: SmoothedLin }  # LinDelta += SmoothedLin * -1
                - { clip: LinCarry,     directWeight: SmoothedLin }  # SmoothedLin += SmoothedLin * 1 (self-weighted carry)
                - tree: 1d
                  name: "clamped step"
                  param: LinDelta
                  directWeight: One                                   # clamped step added at full weight
                  children:
                    - { clip: LinStep_Neg, threshold: -0.1 }
                    - { clip: LinStep_Pos, threshold: 0.1 }
    default: "Smoothing (WD ON)"

  # ===== FrameTime — owned rig; ramp + calc are siblings → calc reads one-frame-old Time, dt still exact =====
  - name: Math/FrameTime
    states:
      "FrameTime (WD ON)":
        motion:
          tree: direct
          name: FrameTime
          children:
            - { clip: Time_Ramp, directWeight: One }   # Time = elapsed seconds (tangents: linear ramp)
            - tree: direct
              name: "FrameTime = Time − LastTime"
              directWeight: One
              children:
                - { clip: FrameTime_Pos, directWeight: Time }      # FrameTime += Time * 1
                - { clip: FrameTime_Neg, directWeight: LastTime }  # FrameTime += LastTime * -1 -> FrameTime = Time - LastTime
                - { clip: LastTime_Set,  directWeight: Time }      # LastTime = Time (stages this frame's Time for next)
    default: "FrameTime (WD ON)"

clips:
  # add — Direct-child writes SumDirect; 1D-child writes Sum1D (distinct AAPs, both live)
  SumDirect_One: { set: { SumDirect: 1.0 } }
  Sum1D_Zero:    { set: { Sum1D: 0.0 } }
  Sum1D_One:     { set: { Sum1D: 1.0 } }

  # subtract
  Diff_Pos: { set: { DiffOut: 1.0 } }
  Diff_Neg: { set: { DiffOut: -1.0 } }

  # multiply
  Prod_One: { set: { ProdOut: 1.0 } }

  # negate/remap
  Neg_Pos: { set: { NegOut: 1.0 } }
  Neg_Neg: { set: { NegOut: -1.0 } }

  # clamp
  Clamp_Zero: { set: { ClampOut: 0.0 } }
  Clamp_One:  { set: { ClampOut: 1.0 } }

  # divide
  Div_Dummy: { set: { DivDummy: 0.0 } }
  Div_One:   { set: { DivOut: 1.0 } }

  # max (composed)
  MaxDiff_Pos:  { set: { MaxDiff: 1.0 } }
  MaxDiff_Neg:  { set: { MaxDiff: -1.0 } }
  MaxRelu_Zero: { set: { MaxRelu: 0.0 } }
  MaxRelu_One:  { set: { MaxRelu: 1.0 } }
  MaxOut_One:   { set: { MaxOut: 1.0 } }

  # min (composed)
  MinDiff_Pos:  { set: { MinDiff: 1.0 } }
  MinDiff_Neg:  { set: { MinDiff: -1.0 } }
  MinRelu_Zero: { set: { MinRelu: 0.0 } }
  MinRelu_One:  { set: { MinRelu: 1.0 } }
  MinOut_Pos:   { set: { MinOut: 1.0 } }
  MinOut_Neg:   { set: { MinOut: -1.0 } }

  # exponential smoothing
  ExpSm_Zero: { set: { SmoothedExp: 0.0 } }
  ExpSm_One:  { set: { SmoothedExp: 1.0 } }

  # linear smoothing
  LinDelta_Pos: { set: { LinDelta: 1.0 } }
  LinDelta_Neg: { set: { LinDelta: -1.0 } }
  LinCarry:     { set: { SmoothedLin: 1.0 } }
  LinStep_Neg:  { set: { SmoothedLin: -0.1 } }
  LinStep_Pos:  { set: { SmoothedLin: 0.1 } }

  # frametime rig: slope-1 linear ramp; Time = elapsed seconds. Huge range -> never needs loop-time within
  # a session. tangents: linear is REQUIRED — flat (default) tangents would make Time a staircase (Delta
  # reads as 0 most frames, spiking at key boundaries).
  Time_Ramp: { curves: { Time: { tangents: linear, keys: [ [0, 0], [10000000, 10000000] ] } } }
  FrameTime_Pos: { set: { FrameTime: 1.0 } }
  FrameTime_Neg: { set: { FrameTime: -1.0 } }
  LastTime_Set:  { set: { LastTime: 1.0 } }
