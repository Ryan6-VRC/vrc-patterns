# held-prop — Gesture-playable grip half. Humanoid muscle curves cannot live in FX (the FX
# playable does not apply them — gimmicks.md §Playable choreography), so this small controller
# mounts the grip in the Gesture playable; the FullController row for it carries type Gesture.
# The grip clip is EMBEDDED muscle curves ("Animator.<muscle>" bindings — path-less Animator
# properties; humanoid muscles retarget across any rig, so a generic pose is legitimate library
# content). The layer is masked to the right hand; while Mode != 2 the empty state writes
# nothing, so the avatar's own gesture layers keep the hand.
#
# Cost to know: while Held, this layer seizes the right hand's fingers — the wearer's gesture
# params still fire (untouched) but the fingers show the grip. That is the point; the README
# names it. Swap the mask + re-key the FX doc's conditions for a left-hand prop.

schema: 1
controller: HeldProp_Gesture
basis: mount-root
role: gesture

defaults:
  writeDefaults: on
  transition: { duration: 0, exitTime: none, interruption: none }

parameters:
  # The FX document owns this param's sync declaration (its params asset is the one the prefab
  # merges); scratch here so this doc emits no second, drift-prone declaration (survey lint:
  # dual param-source drift). Same name on both controllers under ONE FullController — the
  # prefix rewrite keeps them aligned.
  HeldProp/Mode: { type: int, default: 0, scratch: true }

layers:
  - name: HeldProp/Grip
    mask: "Packages/com.vrchat.avatars/Samples/AV3 Demo Assets/Animation/Masks/vrc_Hand Right.mask"
    states:
      Open:
        motion: ~
        transitions:
          - { to: Grip, when: [ HeldProp/Mode equals 2 ], duration: 0.15 }
      Grip:
        motion: { clip: grip }
        transitions:
          - { to: Open, when: [ HeldProp/Mode notEqual 2 ], duration: 0.15 }
    default: Open
    layout:
      nodes:
        Open: [30, 180]
        Grip: [30, 300]
      entry: [50, 120]
      any:   [50, 40]
      exit:  [50, 80]

# A relaxed cylindrical grip: fingers curled around a hand-sized prop, thumb wrapped lighter.
# Stretched: +1 extended, -1 fully curled; Spread: fingers together at slight negative.
# [EMPIRICAL: pose values eyeballed against a 5 cm prop on the emulator rig — feel-tunable]
clips:
  grip:
    set:
      "Animator.RightHand.Thumb.1 Stretched": -0.3
      "Animator.RightHand.Thumb.2 Stretched": -0.4
      "Animator.RightHand.Thumb.3 Stretched": -0.4
      "Animator.RightHand.Thumb.Spread": 0.2
      "Animator.RightHand.Index.1 Stretched": -0.55
      "Animator.RightHand.Index.2 Stretched": -0.6
      "Animator.RightHand.Index.3 Stretched": -0.5
      "Animator.RightHand.Index.Spread": -0.1
      "Animator.RightHand.Middle.1 Stretched": -0.6
      "Animator.RightHand.Middle.2 Stretched": -0.65
      "Animator.RightHand.Middle.3 Stretched": -0.5
      "Animator.RightHand.Middle.Spread": -0.1
      "Animator.RightHand.Ring.1 Stretched": -0.65
      "Animator.RightHand.Ring.2 Stretched": -0.65
      "Animator.RightHand.Ring.3 Stretched": -0.5
      "Animator.RightHand.Ring.Spread": -0.1
      "Animator.RightHand.Little.1 Stretched": -0.7
      "Animator.RightHand.Little.2 Stretched": -0.65
      "Animator.RightHand.Little.3 Stretched": -0.5
      "Animator.RightHand.Little.Spread": -0.1
