# box-tracker — 4-box face-proximity latching crawler. Low-contact-budget sibling of
# contact-tracker: 4 box receivers + an exact linear readout replace the 6-sphere cage + servo.
# The README owns the consumer contract and the reconstruction math; this header + the inline
# comments below own the graph. Mode machine Reset / Searching / Tracking, mirroring
# contact-tracker's three-state rig — deterministic resume, every state re-derives from Enable +
# live proximity. Tracking is a non-normalized direct readout tree summing per-reading coefficients
# into Output.localPosition, against a feedback position constraint that crawls the cage onto it.
# Latch = allowOthers 1->0 at acquisition (filters check only then, runtime.md §Contacts).
#
# The tuned constants are the README's Empirical-constants table — what each knob does, and which of
# these clips or which prefab field authors it. Values live at those sites only; the inline comments
# below carry each one's rationale. runtime.md's 90% rule governs changing any of them.

schema: 1
controller: BoxTracker_Fx
basis: mount-root          # paths bind against the module prefab root (VRCFury FullController seam)
role: fx

defaults:
  writeDefaults: on
  transition: { duration: 0, exitTime: none, interruption: none }

parameters:
  BoxTracker/Enable: { type: bool, default: false, vrc: { synced: true, saved: false } }  # off is the reset
  # Sensing (face proximity) — never synced, never menu-exposed; listed in the params asset for legibility.
  BoxTracker/X+: float
  BoxTracker/X-: float
  BoxTracker/Y+: float
  BoxTracker/Z+: float
  # Constant-1 direct weight carrying the latch clip inside the readout tree; never driven.
  BoxTracker/One: { type: float, default: 1, scratch: true }

layers:
  # Mode machine, mirroring contact-tracker's three-state rig. Deterministic resume: every state
  # re-derives from Enable + live proximity alone. Off-state hygiene (contact-tracker idiom):
  # Reset kills the receiver GOs — a disabled receiver GO FREEZES its float at the last value,
  # so Reset's entry driver zeroes the four floats and Reset exits on Enable alone. Reset parks
  # the cage at HomeAnchor/Offset (parent constraint) — cycling Enable IS the recall gesture for
  # a stranded cage, same as contact-tracker. Searching self-holds the cage where it stands
  # (position constraint, self source only) with filters open at acquisition scale: a sender
  # still inside the cube relatches one frame later.
  - name: Control
    states:
      Reset:                      # Enable off — cage parked at HomeAnchor/Offset, receivers off
        behaviours:
          # localOnly false: the floats are unsynced sensing — every client zeroes its own copy.
          - driver: { set: { BoxTracker/X+: 0, BoxTracker/X-: 0, BoxTracker/Y+: 0, BoxTracker/Z+: 0 } }
        motion: { clip: reset }
        transitions:
          - to: Searching
            when: [ BoxTracker/Enable is true ]
      Searching:                  # filters open, cage self-held, waiting for a sender inside the cube
        motion: { clip: searching }
        transitions:
          - to: Reset
            when: [ BoxTracker/Enable is false ]
          - to: Tracking
            when: [ BoxTracker/X+ greater 0, BoxTracker/X- greater 0, BoxTracker/Y+ greater 0, BoxTracker/Z+ greater 0 ]
      Tracking:                   # filters shut (latched), boxes absolute, Output = live reconstruction, cage crawls onto it
        motion:
          tree: direct
          name: BoxReadout
          normalized: false
          children:
            - { clip: latch,      directWeight: BoxTracker/One }
            - { clip: readout_xp, directWeight: BoxTracker/X+ }
            - { clip: readout_xn, directWeight: BoxTracker/X- }
            - { clip: readout_yp, directWeight: BoxTracker/Y+ }
            - { clip: readout_zp, directWeight: BoxTracker/Z+ }
        transitions:
          - to: Searching         # ANY-loss — the readout is broken the moment one box goes dark
            when: [ BoxTracker/X+ less 0.00001 ]
          - to: Searching
            when: [ BoxTracker/X- less 0.00001 ]
          - to: Searching
            when: [ BoxTracker/Y+ less 0.00001 ]
          - to: Searching
            when: [ BoxTracker/Z+ less 0.00001 ]
          - to: Reset
            when: [ BoxTracker/Enable is false ]
    default: Reset
    # Hand arrangement (animator-schema.md §Arranging for legibility), mirroring contact-tracker: lifecycle
    # descends from Reset under Entry; Tracking left, Searching right; unused Any/Exit parked.
    layout:
      nodes: { Reset: [30, 180], Tracking: [-90, 250], Searching: [150, 250] }
      entry: [50, 120]
      any:   [50, 40]
      exit:  [50, 80]

clips:
  # Reset and Searching differ in the receiver GOs (off-state hygiene) and which constraint
  # holds the cage: Reset parks it on the parent constraint, Searching self-holds it on the
  # position constraint (crawl source at 0). Full-ownership clips, mirroring contact-tracker.
  reset:
    set:
      TrackingPoints/VRCParentConstraint.m_Enabled: 1        # parked at HomeAnchor/Offset
      TrackingPoints/VRCPositionConstraint.m_Enabled: 0      # crawler off
      TrackingPoints/VRCScaleConstraint.GlobalWeight: 0      # acquisition scale (rest = the zone knob)
      TrackingPoints/X+/VRCContactReceiver.allowOthers: 1    # filters open
      TrackingPoints/X+/GameObject.m_IsActive: 0             # receivers off — the entry driver
      TrackingPoints/X-/VRCContactReceiver.allowOthers: 1    #   owns the frozen floats
      TrackingPoints/X-/GameObject.m_IsActive: 0
      TrackingPoints/Y+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Y+/GameObject.m_IsActive: 0
      TrackingPoints/Z+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Z+/GameObject.m_IsActive: 0
      TrackingPoints/X+/Transform.m_LocalScale.x: 0.5        # acquisition cube — all four slabs
      TrackingPoints/X+/Transform.m_LocalScale.y: 0.5        #   collapse to one coincident 3x3x3
      TrackingPoints/X+/Transform.m_LocalScale.z: 1          #   (identical latch sets; invariant)
      TrackingPoints/X-/Transform.m_LocalScale.x: 0.5
      TrackingPoints/X-/Transform.m_LocalScale.y: 0.5
      TrackingPoints/X-/Transform.m_LocalScale.z: 1
      TrackingPoints/Y+/Transform.m_LocalScale.x: 0.5
      TrackingPoints/Y+/Transform.m_LocalScale.y: 0.5
      TrackingPoints/Y+/Transform.m_LocalScale.z: 1
      TrackingPoints/Z+/Transform.m_LocalScale.x: 0.5
      TrackingPoints/Z+/Transform.m_LocalScale.y: 0.5
      TrackingPoints/Z+/Transform.m_LocalScale.z: 1
      TrackingPoints/Output/Transform.m_LocalPosition.x: 0   # Output collapsed to the cage center
      TrackingPoints/Output/Transform.m_LocalPosition.y: 0
      TrackingPoints/Output/Transform.m_LocalPosition.z: 0

  searching:
    set:
      TrackingPoints/VRCParentConstraint.m_Enabled: 0
      TrackingPoints/VRCPositionConstraint.m_Enabled: 1      # self-hold: freeze where it stands (Output pinned to center below = no chase, regardless of gain)
      TrackingPoints/VRCScaleConstraint.GlobalWeight: 0
      TrackingPoints/X+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/X+/GameObject.m_IsActive: 1
      TrackingPoints/X-/VRCContactReceiver.allowOthers: 1
      TrackingPoints/X-/GameObject.m_IsActive: 1
      TrackingPoints/Y+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Y+/GameObject.m_IsActive: 1
      TrackingPoints/Z+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Z+/GameObject.m_IsActive: 1
      TrackingPoints/X+/Transform.m_LocalScale.x: 0.5
      TrackingPoints/X+/Transform.m_LocalScale.y: 0.5
      TrackingPoints/X+/Transform.m_LocalScale.z: 1
      TrackingPoints/X-/Transform.m_LocalScale.x: 0.5
      TrackingPoints/X-/Transform.m_LocalScale.y: 0.5
      TrackingPoints/X-/Transform.m_LocalScale.z: 1
      TrackingPoints/Y+/Transform.m_LocalScale.x: 0.5
      TrackingPoints/Y+/Transform.m_LocalScale.y: 0.5
      TrackingPoints/Y+/Transform.m_LocalScale.z: 1
      TrackingPoints/Z+/Transform.m_LocalScale.x: 0.5
      TrackingPoints/Z+/Transform.m_LocalScale.y: 0.5
      TrackingPoints/Z+/Transform.m_LocalScale.z: 1
      TrackingPoints/Output/Transform.m_LocalPosition.x: 0
      TrackingPoints/Output/Transform.m_LocalPosition.y: 0
      TrackingPoints/Output/Transform.m_LocalPosition.z: 0

  # Latch: rides the readout tree at constant weight 1 (One). Non-normalized direct children sum
  # per binding over the clips that write it, so these values pass through unscaled while the
  # readout_* clips below sum into Output's position. The receiver scales hold the acquisition
  # cube for the first frame (the latch samples first — contact-tracker's coincident-frame idiom)
  # so the latched set is exactly the cube's occupants, then expand to the full slabs. Crawl
  # ease-in (acquisition damp): the source0 curve below ramps the Output source in against the
  # self-brake (source1). At g=0 the self-source holds the cage exactly in place — a clean freeze,
  # no rest-pose snap — so the first-frame cage-gap is not slammed at full gain; authority then
  # rises and the cage glides onto the sender. The curve's end key and the prefab's static source0
  # (what holds outside Tracking) are one knob in two homes — retune together. Clip-owned here, so
  # the gain is not live-scrubbable in play.
  latch:
    set:
      TrackingPoints/VRCParentConstraint.m_Enabled: 0
      TrackingPoints/VRCPositionConstraint.m_Enabled: 1
      TrackingPoints/VRCScaleConstraint.GlobalWeight: 1      # boxes inflate to absolute meters
      TrackingPoints/X+/VRCContactReceiver.allowOthers: 0    # LATCH — filters shut on current senders
      TrackingPoints/X+/GameObject.m_IsActive: 1
      TrackingPoints/X-/VRCContactReceiver.allowOthers: 0
      TrackingPoints/X-/GameObject.m_IsActive: 1
      TrackingPoints/Y+/VRCContactReceiver.allowOthers: 0
      TrackingPoints/Y+/GameObject.m_IsActive: 1
      TrackingPoints/Z+/VRCContactReceiver.allowOthers: 0
      TrackingPoints/Z+/GameObject.m_IsActive: 1
      TrackingPoints/X+/Transform.m_LocalScale.z: 1
      TrackingPoints/X-/Transform.m_LocalScale.z: 1
      TrackingPoints/Y+/Transform.m_LocalScale.z: 1
      TrackingPoints/Z+/Transform.m_LocalScale.z: 1
    curves:
      # Cube for the latch frame, full slabs one frame later (WD would snap these to 1 at t=0
      # if the clip didn't own them — the hold is the point).
      TrackingPoints/X+/Transform.m_LocalScale.x: [ [0, 0.5], [0.016666668, 1] ]
      TrackingPoints/X+/Transform.m_LocalScale.y: [ [0, 0.5], [0.016666668, 1] ]
      TrackingPoints/X-/Transform.m_LocalScale.x: [ [0, 0.5], [0.016666668, 1] ]
      TrackingPoints/X-/Transform.m_LocalScale.y: [ [0, 0.5], [0.016666668, 1] ]
      TrackingPoints/Y+/Transform.m_LocalScale.x: [ [0, 0.5], [0.016666668, 1] ]
      TrackingPoints/Y+/Transform.m_LocalScale.y: [ [0, 0.5], [0.016666668, 1] ]
      TrackingPoints/Z+/Transform.m_LocalScale.x: [ [0, 0.5], [0.016666668, 1] ]
      TrackingPoints/Z+/Transform.m_LocalScale.y: [ [0, 0.5], [0.016666668, 1] ]
      # Crawl ease-in (block above). Flat tangents = smooth onset; end key = the prefab's source0.
      TrackingPoints/VRCPositionConstraint.Sources.source0.Weight: [ [0, 0], [0.5, 0.65] ]

  # Readout leaves: Output.localPosition = sum of (reading x coefficients). With face position f
  # = 1.5 and depth D = 3: x = 1.5(X+ - X-); r = 1.5(X+ + X- - 1); y = 3*Y+ - 1.5 - r and
  # z = 3*Z+ - 1.5 - r, whose constants cancel into pure per-reading coefficients.
  readout_xp:
    set:
      TrackingPoints/Output/Transform.m_LocalPosition.x: 1.5
      TrackingPoints/Output/Transform.m_LocalPosition.y: -1.5
      TrackingPoints/Output/Transform.m_LocalPosition.z: -1.5
  readout_xn:
    set:
      TrackingPoints/Output/Transform.m_LocalPosition.x: -1.5
      TrackingPoints/Output/Transform.m_LocalPosition.y: -1.5
      TrackingPoints/Output/Transform.m_LocalPosition.z: -1.5
  readout_yp:
    set:
      TrackingPoints/Output/Transform.m_LocalPosition.y: 3
  readout_zp:
    set:
      TrackingPoints/Output/Transform.m_LocalPosition.z: 3
