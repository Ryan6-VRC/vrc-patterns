# mirror-detect — three-valued mirror detection by parameter-driver race (Pattern, study).
#
# MirrorDetection/IsMirror reads -1 on the real local avatar, +1 on the mirror clone, 0 on
# remotes. The race: the real local copy evaluates first — DetectMirror still false routes to
# NotMirror, which writes -1 and localOnly-drives DetectMirror true. The mirror clone
# instantiates later with copied parameter values and no driver execution, so it forks straight
# to Mirror (+1). Remotes never enter the local branch and hold IsMirror's declared default 0.
#
# Provenance: the standard parameter-driver race (VRLabs-lineage technique).

schema: 1
controller: MirrorDetect_Fx
basis: avatar-root
role: fx

defaults:
  writeDefaults: on
  transition: { duration: 0, exitTime: none, interruption: none }

parameters:
  IsLocal: bool            # VRC builtin
  # DetectMirror is pure race residue (the local-only driver's flag; a clone entering with it
  # already true routes to Mirror) — scratch, out of the params asset. Never saved: a persisted
  # true would route the next session's real local copy to Mirror permanently.
  MirrorDetection/DetectMirror: { type: bool, scratch: true }
  # IsMirror stays listed deliberately: it is the layer's output signal a consumer reads.
  MirrorDetection/IsMirror: { type: float, aap: true }   # -1 real local, +1 mirror clone, 0 remote

layers:
  - name: MirrorDetection
    states:
      Init:
        motion: { clip: buffer }
        transitions:
          - { to: Fork,   when: [ IsLocal is true ] }
          - { to: Remote, when: [ IsLocal is false ] }
      Fork:
        motion: { clip: buffer }
        transitions:
          # The real local avatar evaluates first: DetectMirror still false -> NotMirror.
          # The mirror clone enters later with the driver-set true value -> Mirror.
          - { to: NotMirror, when: [ MirrorDetection/DetectMirror is false ] }
          - { to: Mirror,    when: [ MirrorDetection/DetectMirror is true ] }
      NotMirror:
        motion: { clip: is_mirror_neg1 }
        behaviours:
          - driver: { localOnly: true, set: { MirrorDetection/DetectMirror: 1 } }
      Mirror:
        motion: { clip: is_mirror_pos1 }
      Remote:
        motion: { clip: buffer }
    default: Init
    layout:
      nodes: { Init: [30, 180], Fork: [-60, 250], Remote: [150, 250], NotMirror: [-150, 320], Mirror: [30, 320] }
      entry: [50, 120]
      any:   [50, 40]
      exit:  [50, 80]

clips:
  buffer: { seconds: 0.0167 }
  is_mirror_neg1: { set: { MirrorDetection/IsMirror: -1 } }
  is_mirror_pos1: { set: { MirrorDetection/IsMirror: 1 } }
