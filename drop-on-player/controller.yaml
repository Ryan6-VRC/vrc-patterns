  tracked:      # latch geometry + tracked-mode rig config; rides the readout tree at weight One.
    set:        # crawl gain: source0 (Output) eases 0 -> 0.65 over 0.5 s (curve below), steady g ~= 0.39 (box-tracker).
      "Container/GameObject.m_IsActive": 1
      "GrabPosition/GrabBone/GameObject.m_IsActive": 1
      "Container/VRCPositionConstraint.m_Enabled": 1
