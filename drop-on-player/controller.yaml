  # Readout leaves (box-tracker, verbatim): Output.localPosition = sum of (reading × coefficients).
  # With face position f = 1.5 and depth D = 3: x = 1.5(X+ − X-); r = 1.5(X+ + X- − 1);
  # y = 3·Y+ − 1.5 − r and z = 3·Z+ − 1.5 − r, whose constants cancel into pure per-reading
  # coefficients. The box geometry (World.prefab absolute, size 6×6×3) and these coefficients are
  # ONE unit — re-derive together if the tracking boxes change.
  readout_xp:
    set:
      "TrackingPoints/Output/Transform.m_LocalPosition.x": 1.5
      "TrackingPoints/Output/Transform.m_LocalPosition.y": -1.5
      "TrackingPoints/Output/Transform.m_LocalPosition.z": -1.5
  readout_xn:
    set:
      "TrackingPoints/Output/Transform.m_LocalPosition.x": -1.5
      "TrackingPoints/Output/Transform.m_LocalPosition.y": -1.5
      "TrackingPoints/Output/Transform.m_LocalPosition.z": -1.5
  readout_yp:
    set:
      "TrackingPoints/Output/Transform.m_LocalPosition.y": 3
  readout_zp:
    set:
      "TrackingPoints/Output/Transform.m_LocalPosition.z": 3
