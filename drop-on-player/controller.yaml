      "TrackingPoints/Y+/Transform.m_LocalScale.z": 1
      "TrackingPoints/Z+/Transform.m_LocalScale.z": 1
    curves:
      # Acquisition column for the latch frame (0.5), full tracking slabs one frame later (1) — the
      # latch samples the coincident column first (box-tracker's coincident-frame idiom). WD would
      # snap these to 1 at t=0 if the clip didn't own the hold.
      "TrackingPoints/X+/Transform.m_LocalScale.x": [ [0, 0.5], [0.016666668, 1] ]
      "TrackingPoints/X+/Transform.m_LocalScale.y": [ [0, 0.5], [0.016666668, 1] ]
      "TrackingPoints/X-/Transform.m_LocalScale.x": [ [0, 0.5], [0.016666668, 1] ]
      "TrackingPoints/X-/Transform.m_LocalScale.y": [ [0, 0.5], [0.016666668, 1] ]
      "TrackingPoints/Y+/Transform.m_LocalScale.x": [ [0, 0.5], [0.016666668, 1] ]
      "TrackingPoints/Y+/Transform.m_LocalScale.y": [ [0, 0.5], [0.016666668, 1] ]
      "TrackingPoints/Z+/Transform.m_LocalScale.x": [ [0, 0.5], [0.016666668, 1] ]
      "TrackingPoints/Z+/Transform.m_LocalScale.y": [ [0, 0.5], [0.016666668, 1] ]
      # Crawl ease-in (acquisition damp, box-tracker idiom): source0 (Output) rises 0 -> 0.65 over
      # 0.5 s vs self-brake 1 — g=0 at latch freezes the cage in place, then glides onto the head.
      # End value = prefab static source0 (one knob, two homes; clip-owned, so no live in-play scrub).
      "TrackingPoints/VRCPositionConstraint.Sources.source0.Weight": [ [0, 0], [0.5, 0.65] ]

