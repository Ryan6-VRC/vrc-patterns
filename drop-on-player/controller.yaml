# drop-on-player — grab a prop and route its release to {own head / another player's head / world}
# (gimmicks.md §Constraint patterns "Attaching a prop to a body point"). A grab-prop whose release
# ARBITRATES between three rest modes instead of always dropping: release while the standard-tag
# self receiver fires => Anchored (own-head constraint, late-syncs); release while the cage
# receivers fire on another player's head => Tracked (box-tracker cage, per-client re-derivation, no
# late-sync); neither => Dropped (sample-and-hold world freeze, no late-sync). Standalone
# compressed controller, not a compose of grab-prop + box-tracker (their idioms are reused inline;
# the arbitration/mode-fusion layer is what this entry ships).
#
# Wire surface: 2 synced bools read directly by the state machine — the pair IS the rest mode:
#   Out=0 Worn=0  Disabled (hidden; off-is-reset)
#   Out=0 Worn=1  Anchored (own head — the safe, late-syncing home; Enable-on lands here)
#   Out=1 Worn=1  Tracked  (another player's head)
#   Out=1 Worn=0  Dropped  (world-frozen)
# Only the wearer's client writes the pair (localOnly drivers on mode-state entry); remotes pose
# the rig from the pair + natively-synced GrabBone_IsGrabbed. Menu intents (Enable, ToHead) are
# UNSYNCED local params — the synced pair carries the outcome, so menu costs 0 extra bits.
#
# TRACKING = box-tracker's 4-box exact readout (lifted from that entry's controller; see its
# README for the reconstruction math). The head-catcher's cage is 4 face-proximity BOX receivers
# (X+ X- Y+ Z+), an exact linear readout writing Output.localPosition inside the Tracked state's
# direct tree, and a feedback constraint (source0 Output : source1 self, steady g ~= 0.39) that
# crawls the cage onto the reading. Steady gain is a static prefab weight; the Tracked clip eases
# source0 0 -> 0.65 over 0.5 s at acquisition — the ease-in the exact readout still needs, since a
# constant gain slams the first-frame acquisition gap (box-tracker).
# The old 6-sphere crawler-servo (a separate always-on layer, raw proximity => source weights, ALL-
# loss, a 1.0 s park-brake ramp) is gone: 4 contacts instead of 6, an exact position instead of a
# converging centroid, ANY-loss instead of ALL-loss (one dead box breaks the reconstruction).
#
# Head-catch zone (wear-test-tuned): the acquisition cube is stretched to a VERTICAL COLUMN — 0.15 m wide/deep,
# 0.3 m tall — so lowering a prop onto a head reliably catches (and it widens the release-
# arbitration zone the old rig flagged as maybe too tight). Set on the prefab by TrackingPoints
# rest localScale + VRCScaleConstraint ScaleAtRest (0.05, 0.1, 0.05) — zone side = 3 × scale
# per axis. The receiver box is a 1.5³ cube in local space, so the 90° rotations are shape-
# invariant and a non-uniform parent scale gives a clean axis-aligned box; tracking geometry is
# constraint-pinned absolute (World.prefab, uniform) so the readout stays EXACT. Cost: one latch
# frame of ~r·(s_y/s_x − 1) ≈ 3 cm radius-compensation skew on Y/Z, which decays via the crawl
# (box-tracker's documented non-uniform trap — benign for a prop).
#
# Empirical constants (runtime.md 90% rule) — every one labeled:
#   released pulse: freeze t=0, re-sample window [0.25, 0.50) s   [EMPIRICAL: grab-prop emulator sweep]
#   remote release-settle: 0.5 s (= pulse length; remotes route by pair at pulse end, covering
#     the sync tick so a world-drop doesn't flash through a stale mode)  [EMPIRICAL: source-avatar attach dwell]
#   remote boot dwell: 1.0 s (timer clip)                          [EMPIRICAL: grab-prop in-game candidate]
#   crawl gain: source0 0.65 : source1 1 -> steady g ~= 0.39; Tracked clip eases source0 0 -> 0.65 over 0.5 s  [box-tracker]
#   acquisition zone 0.15 × 0.15 × 0.3 m (TrackingPoints ScaleAtRest); loss <0.00001, acquire >0
#
# Deliberate deltas from the source ancestor: no banded mode int (2 direct bools —
# few exclusive states, gimmicks.md §Packaging); no 6 s world-band dwell (it existed for
# Custom-Object-Sync repair — no COS here; the non-derivable bands park in Waiting instead); no
# 7th arbitration receiver (the 4 cage receivers, parked ON the prop with filters open, are the
# "near another head" sensor); no gesture grammar / multi-anchor (out of scope).

schema: 1
controller: DropOnPlayer_Fx
basis: mount-root          # paths bind against the module prefab root (VRCFury FullController seam)
role: fx

defaults:
  writeDefaults: on
  transition: { duration: 0, exitTime: none, interruption: none }

parameters:
  # The synced pair — the rest mode, written only by the wearer's localOnly drivers.
  DropOnPlayer/Out:    { type: bool, default: false, vrc: { synced: true, saved: false } }
  DropOnPlayer/Worn:   { type: bool, default: false, vrc: { synced: true, saved: false } }
  # Menu intents — local-only (unsynced); the pair carries the outcome.
  DropOnPlayer/Enable: { type: bool, default: false, vrc: { synced: false, saved: false } }
  DropOnPlayer/ToHead: { type: bool, default: false, vrc: { synced: false, saved: false } }
  # Sensing — never synced, never menu-exposed; listed in the params asset for legibility.
  DropOnPlayer/SelfDetect: float   # standard-Head proximity (own head sender -> prop receiver; allowSelf, localOnly)
  DropOnPlayer/X+: float           # cage face-proximity (Head tag, allowOthers, localOnly:0 — remotes re-derive)
  DropOnPlayer/X-: float
  DropOnPlayer/Y+: float
  DropOnPlayer/Z+: float
  # Constant-1 direct weight carrying the latch clip inside the readout tree; never driven.
  DropOnPlayer/One: { type: float, default: 1, scratch: true }
  GrabBone_IsGrabbed: bool         # minted by the grab physbone (parameter: GrabBone); native grab sync
  IsLocal: bool                    # VRC built-in

layers:
  # Mode machine. Local edges arbitrate off live sensors and stamp the pair; remote edges pose
  # from the pair alone (deterministic resume). Grab edges are shared — the grab is natively
  # synced per client, no pair code for the transient carry.
  - name: DropOnPlayer/Control
    states:
      # Remote boot dwell: wait out param arrival, then route by pair. Non-derivable bands
      # (Out=1: the tracked/dropped position never syncs) park in Waiting, hidden, until a
      # witnessed grab. Local skips straight to Disabled.
      Timer:
        motion: { clip: timer }
        transitions:
          - { to: Disabled, when: [ IsLocal is true ] }
          - { to: Anchored, when: [ DropOnPlayer/Out is false, DropOnPlayer/Worn is true ], exitTime: 1.0 }
          - { to: Waiting,  when: [ DropOnPlayer/Out is true ], exitTime: 1.0 }
          - { to: Disabled, when: [], exitTime: 1.0 }
      Disabled:
        behaviours:
          - driver: { localOnly: true, set: { DropOnPlayer/Out: 0, DropOnPlayer/Worn: 0 } }
        motion: { clip: disabled }
        transitions:
          - { to: Anchored, when: [ IsLocal is true, DropOnPlayer/Enable is true ] }
          - { to: Anchored, when: [ IsLocal is false, DropOnPlayer/Worn is true, DropOnPlayer/Out is false ] }
          - { to: Waiting,  when: [ IsLocal is false, DropOnPlayer/Out is true ] }
      # Anchored — own head (the reset target: Enable-on and ToHead both land here).
      Anchored:
        behaviours:
          - driver: { localOnly: true, set: { DropOnPlayer/Out: 0, DropOnPlayer/Worn: 1 } }
        motion: { clip: anchored }
        transitions:
          - { to: Disabled, when: [ IsLocal is true, DropOnPlayer/Enable is false ] }
          - { to: Disabled, when: [ IsLocal is false, DropOnPlayer/Worn is false, DropOnPlayer/Out is false ] }
          - { to: Grabbed,  when: [ GrabBone_IsGrabbed is true ] }
          - { to: Tracked,  when: [ IsLocal is false, DropOnPlayer/Out is true, DropOnPlayer/Worn is true ] }
          - { to: Dropped,  when: [ IsLocal is false, DropOnPlayer/Out is true, DropOnPlayer/Worn is false ] }
      # Grabbed — the carry. Release-time arbitration is the local exit ladder, priority top-down:
      # own head beats another player's head beats world. Remotes route through Released and wait
      # for the pair. The pair holds its previous code during the carry (no transient band).
      Grabbed:
        motion: { clip: grabbed }
        transitions:
          - { to: Disabled, when: [ IsLocal is true, DropOnPlayer/Enable is false ] }
          - { to: Disabled, when: [ IsLocal is false, DropOnPlayer/Worn is false, DropOnPlayer/Out is false ] }
          - { to: Anchored, when: [ IsLocal is true, GrabBone_IsGrabbed is false, DropOnPlayer/SelfDetect greater 0 ] }
          - { to: Tracked,  when: [ IsLocal is true, GrabBone_IsGrabbed is false, DropOnPlayer/X+ greater 0, DropOnPlayer/X- greater 0, DropOnPlayer/Y+ greater 0, DropOnPlayer/Z+ greater 0 ] }
          - { to: Released, when: [ GrabBone_IsGrabbed is false ] }
      # Release choreography (world-drop + remote settle window): t=0 the Container constraint
      # disables (the freeze) and the bone chain re-anchors onto the frozen prop; t=0.25
      # SourcePosition re-samples the settled tip; t=0.5 it holds. Locally only the world-drop
      # branch enters here (driver stamps 10 AT RELEASE so the pair beats the remotes' pulse end);
      # remotes enter on every release and route by pair at exitTime — a stale pair self-corrects
      # via the mode states' remote edges. No grab exit: the pulse is a re-grab lockout.
      Released:
        behaviours:
          - driver: { localOnly: true, set: { DropOnPlayer/Out: 1, DropOnPlayer/Worn: 0 } }
        motion: { clip: released }
        transitions:
          - { to: Disabled, when: [ IsLocal is true, DropOnPlayer/Enable is false ] }
          - { to: Anchored, when: [ DropOnPlayer/Worn is true, DropOnPlayer/Out is false ], exitTime: 1.0 }
          - { to: Tracked,  when: [ DropOnPlayer/Worn is true, DropOnPlayer/Out is true ], exitTime: 1.0 }
          - { to: Disabled, when: [ DropOnPlayer/Worn is false, DropOnPlayer/Out is false ], exitTime: 1.0 }
          - { to: Dropped,  when: [], exitTime: 1.0 }
      # Dropped — world-frozen (the disabled constraint holds the transform; the held sample lets
      # a re-grab pick up at the drop point). Also the LOCAL loss target: the driver re-stamps 10
      # when Tracked loses its sender, so remotes converge on freeze.
      Dropped:
        behaviours:
          - driver: { localOnly: true, set: { DropOnPlayer/Out: 1, DropOnPlayer/Worn: 0 } }
        motion: { clip: dropped }
        transitions:
          - { to: Disabled, when: [ IsLocal is true, DropOnPlayer/Enable is false ] }
          - { to: Disabled, when: [ IsLocal is false, DropOnPlayer/Worn is false, DropOnPlayer/Out is false ] }
          - { to: Grabbed,  when: [ GrabBone_IsGrabbed is true ] }
          - { to: Anchored, when: [ IsLocal is true, DropOnPlayer/ToHead is true ] }
          - { to: Anchored, when: [ IsLocal is false, DropOnPlayer/Worn is true, DropOnPlayer/Out is false ] }
          - { to: Tracked,  when: [ IsLocal is false, DropOnPlayer/Worn is true, DropOnPlayer/Out is true ] }
      # Tracked — the box cage latches (allowOthers shut), the readout writes Output.localPosition
      # inside this state's direct tree, and the static-gain feedback constraint crawls the cage
      # onto it; every client runs this on its own sensors. ANY-loss (box-tracker): one dead box
      # breaks the reconstruction, so the loss edges fire on the FIRST box to drop, not the last.
      # LOCAL loss stamps Dropped (freeze, never snap-home — observers unload the target at
      # different times); REMOTE loss falls to Lost without writing the pair.
      Tracked:
        behaviours:
          - driver: { localOnly: true, set: { DropOnPlayer/Out: 1, DropOnPlayer/Worn: 1 } }
        motion:
          tree: direct
          name: BoxReadout
          normalized: false
          children:
            - { clip: tracked, directWeight: DropOnPlayer/One }   # latch geometry + tracked-mode rig config
            - { clip: readout_xp, directWeight: DropOnPlayer/X+ }
            - { clip: readout_xn, directWeight: DropOnPlayer/X- }
            - { clip: readout_yp, directWeight: DropOnPlayer/Y+ }
            - { clip: readout_zp, directWeight: DropOnPlayer/Z+ }
        transitions:
          - { to: Disabled, when: [ IsLocal is true, DropOnPlayer/Enable is false ] }
          - { to: Disabled, when: [ IsLocal is false, DropOnPlayer/Worn is false, DropOnPlayer/Out is false ] }
          - { to: Grabbed,  when: [ GrabBone_IsGrabbed is true ] }
          - { to: Anchored, when: [ IsLocal is true, DropOnPlayer/ToHead is true ] }
          # ANY-loss, local -> Dropped (freeze). One transition per box (a layer takes one edge/frame; whichever box dies first wins).
          - { to: Dropped, when: [ IsLocal is true, DropOnPlayer/X+ less 0.00001 ] }
          - { to: Dropped, when: [ IsLocal is true, DropOnPlayer/X- less 0.00001 ] }
          - { to: Dropped, when: [ IsLocal is true, DropOnPlayer/Y+ less 0.00001 ] }
          - { to: Dropped, when: [ IsLocal is true, DropOnPlayer/Z+ less 0.00001 ] }
          # ANY-loss, remote -> Lost (freeze, pair untouched).
          - { to: Lost, when: [ IsLocal is false, DropOnPlayer/X+ less 0.00001 ] }
          - { to: Lost, when: [ IsLocal is false, DropOnPlayer/X- less 0.00001 ] }
          - { to: Lost, when: [ IsLocal is false, DropOnPlayer/Y+ less 0.00001 ] }
          - { to: Lost, when: [ IsLocal is false, DropOnPlayer/Z+ less 0.00001 ] }
          - { to: Anchored, when: [ IsLocal is false, DropOnPlayer/Worn is true, DropOnPlayer/Out is false ] }
          - { to: Dropped,  when: [ IsLocal is false, DropOnPlayer/Worn is false, DropOnPlayer/Out is true ] }
      # Lost — remote-only freeze while the pair still reads Tracked (this client's cage lost the
      # sender; it cannot rewrite the synced pair, and re-opening the filters would re-latch a
      # WRONG nearby head). Same pose as Dropped; exits only on a witnessed grab or a pair change
      # — no pair-11 re-entry, so no Tracked<->Lost oscillation.
      Lost:
        motion: { clip: dropped }
        transitions:
          - { to: Grabbed,  when: [ GrabBone_IsGrabbed is true ] }
          - { to: Disabled, when: [ DropOnPlayer/Worn is false, DropOnPlayer/Out is false ] }
          - { to: Anchored, when: [ DropOnPlayer/Worn is true, DropOnPlayer/Out is false ] }
          - { to: Dropped,  when: [ DropOnPlayer/Worn is false, DropOnPlayer/Out is true ] }
      # Late-join park: pair says the prop is out (Out=1) but its position never synced — hidden
      # (fail-visible) until a witnessed grab re-establishes it. The grab physbone lives OUTSIDE
      # the hidden Container branch so the grab always can.
      Waiting:
        motion: { clip: waiting }
        transitions:
          - { to: Grabbed,  when: [ GrabBone_IsGrabbed is true ] }
          - { to: Disabled, when: [ DropOnPlayer/Worn is false, DropOnPlayer/Out is false ] }
          - { to: Anchored, when: [ DropOnPlayer/Worn is true, DropOnPlayer/Out is false ] }
    default: Timer
    # Hand arrangement (animator-schema.md §Arranging for legibility): boot spine descends Timer -> Disabled;
    # the remote-only pair (Waiting, Lost) shares the left column with Anchored; Grabbed is the
    # central hub, midway between home (Anchored) and Lost, over Tracked in the center column;
    # the release pulse falls right to Dropped. Any/Exit parked top-left.
    layout:
      nodes:
        Timer:    [30, 180]
        Waiting:  [-330, 250]
        Disabled: [150, 250]
        Anchored: [-330, 320]
        Released: [390, 320]
        Grabbed:  [30, 390]
        Lost:     [-330, 460]
        Tracked:  [30, 530]
        Dropped:  [390, 530]
      entry: [50, 120]
      any:   [50, 40]
      exit:  [50, 80]

# Every Control clip owns the full rig-property set explicitly (no reliance on WD revert; the
# semantics survive a VRCFury WD-OFF conversion). The cage is box-tracker's: 4 BOX receivers
# (X+ X- Y+ Z+) coincident at the cage center, resized only by host-GO localScale — (0.5,0.5,1)
# collapses them to one acquisition column, (1,1,1) is the absolute tracking geometry. No clip
# moves a receiver's localPosition (the readout is the DBT, not a position spread); the crawl
# constraint's steady source weights are static in the prefab, and only the Tracked clip animates
# source0 (the acquisition ease-in above). Output is pinned to the cage center everywhere but
# Tracked, where the readout tree writes it.
# Off-state hygiene: Disabled kills the grab physbone's GO (an "off" module must not stay
# grabbable; resetWhenDisabled 0 preserves pose) and the four cage-receiver GOs (no sensing while
# off). A disabled receiver GO FREEZES its float at the last value — safe here because the floats
# are only read from Grabbed's release ladder and Tracked's loss edges, states whose receivers
# have been live for many frames by the time those edges evaluate. SelfDetect rides TrackingOffset
# under Container, which these same clips deactivate — same freeze, same argument (it is read only
# from Grabbed's ladder, where Container has been live throughout the carry). Timer/Waiting keep
# everything alive: they are enabled-module states, and the witnessed grab is Waiting's only exit.
# KNOWN SIMPLIFICATION — the GO kill is only half of force-release: a disabled physbone never
# clears GrabBone_IsGrabbed (`runtime.md`), so toggling off mid-grab freezes it true and the next
# enable re-enters Grabbed (and a stale true also opens Waiting/Lost's grab edges) until the
# re-enabled bone republishes. Accepted: this is a library sample, not a module whose off must
# interrupt an action. A consumer that needs a clean force-release adds a driver clearing the param
# to Disabled — the write sticks precisely because the bone GO is inactive (`verify.md`).
# Constraint source maps (box-tracker cage):
#   Container/VRCPositionConstraint:      source0 HeadMount/AnchorOffset, source1 SourcePosition,
#                                         source2 TrackedPoint/RideOffset
#   SourcePosition/VRCPositionConstraint: source0 DropPosition, source1 TrackingPoints
#   GrabPosition/VRCPositionConstraint:   source0 HeadMount/AnchorOffset, source1 Container
#   TrackingPoints/VRCPositionConstraint: source0 Output (own child), source1 self — steady g ~= 0.39 (0.65:1) crawl feedback, eased in at acquisition
#   TrackingPoints/VRCParentConstraint:   source0 Container/TrackingOffset (the cage rides the sensed
#                                         point below the prop when not tracking — at release the cage
#                                         sits at head-contact level under the prop: the arbitration geometry)
clips:
  disabled:
    set:
      "Container/GameObject.m_IsActive": 0
      "GrabPosition/GrabBone/GameObject.m_IsActive": 0
      "Container/VRCPositionConstraint.m_Enabled": 1
      "Container/VRCPositionConstraint.Sources.source0.Weight": 1
      "Container/VRCPositionConstraint.Sources.source1.Weight": 0
      "Container/VRCPositionConstraint.Sources.source2.Weight": 0
      "SourcePosition/VRCPositionConstraint.IsActive": 1
      "SourcePosition/VRCPositionConstraint.Sources.source0.Weight": 1
      "SourcePosition/VRCPositionConstraint.Sources.source1.Weight": 0
      "GrabPosition/VRCPositionConstraint.IsActive": 0
      "GrabPosition/VRCPositionConstraint.Sources.source0.Weight": 1
      "GrabPosition/VRCPositionConstraint.Sources.source1.Weight": 0
      "TrackingPoints/VRCParentConstraint.m_Enabled": 1
      "TrackingPoints/VRCPositionConstraint.m_Enabled": 0
      "TrackingPoints/VRCScaleConstraint.GlobalWeight": 0
      "TrackingPoints/X+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/X+/GameObject.m_IsActive": 0
      "TrackingPoints/X-/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/X-/GameObject.m_IsActive": 0
      "TrackingPoints/Y+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/Y+/GameObject.m_IsActive": 0
      "TrackingPoints/Z+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/Z+/GameObject.m_IsActive": 0
      "TrackingPoints/X+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/X+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/X+/Transform.m_LocalScale.z": 1
      "TrackingPoints/X-/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/X-/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/X-/Transform.m_LocalScale.z": 1
      "TrackingPoints/Y+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/Y+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/Y+/Transform.m_LocalScale.z": 1
      "TrackingPoints/Z+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/Z+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/Z+/Transform.m_LocalScale.z": 1
      "TrackingPoints/Output/Transform.m_LocalPosition.x": 0
      "TrackingPoints/Output/Transform.m_LocalPosition.y": 0
      "TrackingPoints/Output/Transform.m_LocalPosition.z": 0

  timer:        # disabled pose held for the remote boot dwell  [EMPIRICAL: 1.0 s]
    seconds: 1.0
    set:
      "Container/GameObject.m_IsActive": 0
      "GrabPosition/GrabBone/GameObject.m_IsActive": 1
      "Container/VRCPositionConstraint.m_Enabled": 1
      "Container/VRCPositionConstraint.Sources.source0.Weight": 1
      "Container/VRCPositionConstraint.Sources.source1.Weight": 0
      "Container/VRCPositionConstraint.Sources.source2.Weight": 0
      "SourcePosition/VRCPositionConstraint.IsActive": 1
      "SourcePosition/VRCPositionConstraint.Sources.source0.Weight": 1
      "SourcePosition/VRCPositionConstraint.Sources.source1.Weight": 0
      "GrabPosition/VRCPositionConstraint.IsActive": 0
      "GrabPosition/VRCPositionConstraint.Sources.source0.Weight": 1
      "GrabPosition/VRCPositionConstraint.Sources.source1.Weight": 0
      "TrackingPoints/VRCParentConstraint.m_Enabled": 1
      "TrackingPoints/VRCPositionConstraint.m_Enabled": 0
      "TrackingPoints/VRCScaleConstraint.GlobalWeight": 0
      "TrackingPoints/X+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/X+/GameObject.m_IsActive": 1
      "TrackingPoints/X-/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/X-/GameObject.m_IsActive": 1
      "TrackingPoints/Y+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/Y+/GameObject.m_IsActive": 1
      "TrackingPoints/Z+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/Z+/GameObject.m_IsActive": 1
      "TrackingPoints/X+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/X+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/X+/Transform.m_LocalScale.z": 1
      "TrackingPoints/X-/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/X-/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/X-/Transform.m_LocalScale.z": 1
      "TrackingPoints/Y+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/Y+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/Y+/Transform.m_LocalScale.z": 1
      "TrackingPoints/Z+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/Z+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/Z+/Transform.m_LocalScale.z": 1
      "TrackingPoints/Output/Transform.m_LocalPosition.x": 0
      "TrackingPoints/Output/Transform.m_LocalPosition.y": 0
      "TrackingPoints/Output/Transform.m_LocalPosition.z": 0

  anchored:
    set:
      "Container/GameObject.m_IsActive": 1
      "GrabPosition/GrabBone/GameObject.m_IsActive": 1
      "Container/VRCPositionConstraint.m_Enabled": 1
      "Container/VRCPositionConstraint.Sources.source0.Weight": 1
      "Container/VRCPositionConstraint.Sources.source1.Weight": 0
      "Container/VRCPositionConstraint.Sources.source2.Weight": 0
      "SourcePosition/VRCPositionConstraint.IsActive": 1
      "SourcePosition/VRCPositionConstraint.Sources.source0.Weight": 1
      "SourcePosition/VRCPositionConstraint.Sources.source1.Weight": 0
      "GrabPosition/VRCPositionConstraint.IsActive": 1
      "GrabPosition/VRCPositionConstraint.Sources.source0.Weight": 1
      "GrabPosition/VRCPositionConstraint.Sources.source1.Weight": 0
      "TrackingPoints/VRCParentConstraint.m_Enabled": 1
      "TrackingPoints/VRCPositionConstraint.m_Enabled": 0
      "TrackingPoints/VRCScaleConstraint.GlobalWeight": 0
      "TrackingPoints/X+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/X+/GameObject.m_IsActive": 1
      "TrackingPoints/X-/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/X-/GameObject.m_IsActive": 1
      "TrackingPoints/Y+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/Y+/GameObject.m_IsActive": 1
      "TrackingPoints/Z+/VRCContactReceiver.allowOthers": 1
      "TrackingPoints/Z+/GameObject.m_IsActive": 1
      "TrackingPoints/X+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/X+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/X+/Transform.m_LocalScale.z": 1
      "TrackingPoints/X-/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/X-/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/X-/Transform.m_LocalScale.z": 1
      "TrackingPoints/Y+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/Y+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/Y+/Transform.m_LocalScale.z": 1
      "TrackingPoints/Z+/Transform.m_LocalScale.x": 0.5
      "TrackingPoints/Z+/Transform.m_LocalScale.y": 0.5
      "TrackingPoints/Z+/Transform.m_LocalScale.z": 1
      "TrackingPoints/Output/Transform.m_LocalPosition.x": 0
      "TrackingPoints/Output/Transform.m_LocalPosition.y": 0
      "TrackingPoints/Output/Transform.m_LocalPosition.z": 0

  grabbed:
    set:
      "Container/GameObject.m_IsActive": 1
      "GrabPosition/GrabBone/GameObject.m_IsActive": 1
      "Container/VRCPositionConstraint.m_Enabled": 1
      "Container/VRCPositionConstraint.Sources.source0.Weight": 0
      "Container/VRCPositionConstraint.Sources.source1.Weight": 1
