# contact-tracker — latching proximity tracker.
# Tracks one point on another player (default: a hand) with zero position sync: 6 coincident
# Proximity receivers acquire, filters animate shut to latch, a crawler-servo position
# constraint chases the latched sender. Every client re-derives the cage locally — receivers
# are localOnly:0 by necessity, and the tracked position does NOT late-sync (documented).
#
# Provenance: generalized from a private production avatar's contact tracker (VRCFury conversion of VRLabs
# Contact-Tracker, MIT). Mechanism confirmed against both sources; vestigial Size motion-time
# bindings and orphaned transitions not ported.
#
# The tuned constants are the README's Empirical-constants table — what each knob does, and which of
# these clips or which prefab field authors it. Values live at those sites only; the inline comments
# below carry each one's rationale. runtime.md's 90% rule governs changing any of them.

schema: 1
controller: ContactTracker_Fx
basis: mount-root          # paths bind against the module prefab root (VRCFury FullController seam)
role: fx

defaults:
  writeDefaults: on
  transition: { duration: 0, exitTime: none, interruption: none }

parameters:
  ContactTracker/Enable: { type: bool, default: false, vrc: { synced: true, saved: false } }  # off is the reset
  # Sensing (proximity) — never synced, never menu-exposed; listed in the params asset for legibility.
  ContactTracker/X+: float
  ContactTracker/X-: float
  ContactTracker/Y+: float
  ContactTracker/Y-: float
  ContactTracker/Z+: float
  ContactTracker/Z-: float

layers:
  # Mode machine. Deterministic resume: every state re-derives from Enable + live proximity
  # alone. Off-state hygiene: Reset kills the receiver GOs (an "off" module must not keep
  # sensing) — and a disabled receiver GO FREEZES its float at the last value, so Reset's entry
  # driver zeroes the six floats (nothing rewrites them while the receivers are off) and Reset
  # exits on Enable alone. Resume-in-place survives via Searching: its clip self-holds the cage
  # where it stands with filters open, so a sender still in range relatches one frame later
  # (Searching -> Tracking) with the identical latch geometry the old Reset -> Tracking direct
  # edge gave.
  - name: Control
    states:
      Reset:                      # Enable off — parked at HomeAnchor, receivers off, cage collapsed
        behaviours:
          # localOnly false: the floats are unsynced sensing — every client zeroes its own copy.
          - driver: { set: { ContactTracker/X+: 0, ContactTracker/X-: 0, ContactTracker/Y+: 0, ContactTracker/Y-: 0, ContactTracker/Z+: 0, ContactTracker/Z-: 0 } }
        motion: { clip: reset }
        transitions:
          - to: Searching
            when: [ ContactTracker/Enable is true ]
      Searching:                  # filters open, probes coincident, crawler self-holds (park brake 1)
        motion: { clip: searching }
        transitions:
          - to: Reset
            when: [ ContactTracker/Enable is false ]
          - to: Tracking
            when: [ ContactTracker/X+ greater 0, ContactTracker/X- greater 0, ContactTracker/Y+ greater 0, ContactTracker/Y- greater 0, ContactTracker/Z+ greater 0, ContactTracker/Z- greater 0 ]
      Tracking:                   # filters shut (latched), cage spread + absolute scale, park released after dwell
        motion: { clip: tracking }
        transitions:
          - to: Searching         # lost — recollapse and self-hold where it stands (freeze, not snap-home)
            when: [ ContactTracker/X+ less 0.00001, ContactTracker/X- less 0.00001, ContactTracker/Y+ less 0.00001, ContactTracker/Y- less 0.00001, ContactTracker/Z+ less 0.00001, ContactTracker/Z- less 0.00001 ]
          - to: Reset
            when: [ ContactTracker/Enable is false ]
    default: Reset
    # Hand arrangement (animator-schema.md §Arranging for legibility): lifecycle descends from the default
    # state under Entry; Tracking left, Searching right; unused Any/Exit parked top-left.
    layout:
      nodes: { Reset: [30, 180], Tracking: [-90, 250], Searching: [150, 250] }
      entry: [50, 120]
      any:   [50, 40]
      exit:  [50, 80]

  # Crawler servo: raw proximity => constraint source weight, always on (WD ON), raw additive
  # weights (constraint normalizes by sum). Park brake (source6) is owned by the Control layer.
  - name: CrawlerServo
    states:
      Crawl:
        motion:
          tree: direct
          name: CrawlerServo
          normalized: false
          children:
            - { clip: crawl_xp, directWeight: ContactTracker/X+ }
            - { clip: crawl_xn, directWeight: ContactTracker/X- }
            - { clip: crawl_yp, directWeight: ContactTracker/Y+ }
            - { clip: crawl_yn, directWeight: ContactTracker/Y- }
            - { clip: crawl_zp, directWeight: ContactTracker/Z+ }
            - { clip: crawl_zn, directWeight: ContactTracker/Z- }
    default: Crawl

clips:
  # Each Control state owns the full rig-property set explicitly (no reliance on WD revert),
  # mirroring the ancestor's full-ownership clips.
  reset:
    set:
      TrackingPoints/VRCParentConstraint.m_Enabled: 1        # parked at HomeAnchor
      TrackingPoints/VRCPositionConstraint.m_Enabled: 0      # crawler off
      TrackingPoints/VRCScaleConstraint.GlobalWeight: 0      # acquisition scale
      TrackingPoints/VRCPositionConstraint.Sources.source6.Weight: 0
      TrackingPoints/X+/VRCContactReceiver.allowOthers: 1    # filters open
      TrackingPoints/X+/GameObject.m_IsActive: 0
      TrackingPoints/X-/VRCContactReceiver.allowOthers: 1
      TrackingPoints/X-/GameObject.m_IsActive: 0
      TrackingPoints/Y+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Y+/GameObject.m_IsActive: 0
      TrackingPoints/Y-/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Y-/GameObject.m_IsActive: 0
      TrackingPoints/Z+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Z+/GameObject.m_IsActive: 0
      TrackingPoints/Z-/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Z-/GameObject.m_IsActive: 0
      TrackingPoints/X+/Transform.m_LocalPosition.x: 0       # probes coincident
      TrackingPoints/X+/Transform.m_LocalPosition.y: 0
      TrackingPoints/X+/Transform.m_LocalPosition.z: 0
      TrackingPoints/X-/Transform.m_LocalPosition.x: 0
      TrackingPoints/X-/Transform.m_LocalPosition.y: 0
      TrackingPoints/X-/Transform.m_LocalPosition.z: 0
      TrackingPoints/Y+/Transform.m_LocalPosition.x: 0
      TrackingPoints/Y+/Transform.m_LocalPosition.y: 0
      TrackingPoints/Y+/Transform.m_LocalPosition.z: 0
      TrackingPoints/Y-/Transform.m_LocalPosition.x: 0
      TrackingPoints/Y-/Transform.m_LocalPosition.y: 0
      TrackingPoints/Y-/Transform.m_LocalPosition.z: 0
      TrackingPoints/Z+/Transform.m_LocalPosition.x: 0
      TrackingPoints/Z+/Transform.m_LocalPosition.y: 0
      TrackingPoints/Z+/Transform.m_LocalPosition.z: 0
      TrackingPoints/Z-/Transform.m_LocalPosition.x: 0
      TrackingPoints/Z-/Transform.m_LocalPosition.y: 0
      TrackingPoints/Z-/Transform.m_LocalPosition.z: 0

  searching:
    set:
      TrackingPoints/VRCParentConstraint.m_Enabled: 0
      TrackingPoints/VRCPositionConstraint.m_Enabled: 1      # crawler on, self-held
      TrackingPoints/VRCScaleConstraint.GlobalWeight: 0
      TrackingPoints/VRCPositionConstraint.Sources.source6.Weight: 1   # park brake full
      TrackingPoints/X+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/X+/GameObject.m_IsActive: 1
      TrackingPoints/X-/VRCContactReceiver.allowOthers: 1
      TrackingPoints/X-/GameObject.m_IsActive: 1
      TrackingPoints/Y+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Y+/GameObject.m_IsActive: 1
      TrackingPoints/Y-/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Y-/GameObject.m_IsActive: 1
      TrackingPoints/Z+/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Z+/GameObject.m_IsActive: 1
      TrackingPoints/Z-/VRCContactReceiver.allowOthers: 1
      TrackingPoints/Z-/GameObject.m_IsActive: 1
      TrackingPoints/X+/Transform.m_LocalPosition.x: 0
      TrackingPoints/X+/Transform.m_LocalPosition.y: 0
      TrackingPoints/X+/Transform.m_LocalPosition.z: 0
      TrackingPoints/X-/Transform.m_LocalPosition.x: 0
      TrackingPoints/X-/Transform.m_LocalPosition.y: 0
      TrackingPoints/X-/Transform.m_LocalPosition.z: 0
      TrackingPoints/Y+/Transform.m_LocalPosition.x: 0
      TrackingPoints/Y+/Transform.m_LocalPosition.y: 0
      TrackingPoints/Y+/Transform.m_LocalPosition.z: 0
      TrackingPoints/Y-/Transform.m_LocalPosition.x: 0
      TrackingPoints/Y-/Transform.m_LocalPosition.y: 0
      TrackingPoints/Y-/Transform.m_LocalPosition.z: 0
      TrackingPoints/Z+/Transform.m_LocalPosition.x: 0
      TrackingPoints/Z+/Transform.m_LocalPosition.y: 0
      TrackingPoints/Z+/Transform.m_LocalPosition.z: 0
      TrackingPoints/Z-/Transform.m_LocalPosition.x: 0
      TrackingPoints/Z-/Transform.m_LocalPosition.y: 0
      TrackingPoints/Z-/Transform.m_LocalPosition.z: 0

  tracking:
    seconds: 1.0
    set:
      TrackingPoints/VRCParentConstraint.m_Enabled: 0
      TrackingPoints/VRCPositionConstraint.m_Enabled: 1
      TrackingPoints/VRCScaleConstraint.GlobalWeight: 1      # cage inflates to absolute meters
      TrackingPoints/X+/VRCContactReceiver.allowOthers: 0    # LATCH — filters shut on current senders
      TrackingPoints/X+/GameObject.m_IsActive: 1
      TrackingPoints/X-/VRCContactReceiver.allowOthers: 0
      TrackingPoints/X-/GameObject.m_IsActive: 1
      TrackingPoints/Y+/VRCContactReceiver.allowOthers: 0
      TrackingPoints/Y+/GameObject.m_IsActive: 1
      TrackingPoints/Y-/VRCContactReceiver.allowOthers: 0
      TrackingPoints/Y-/GameObject.m_IsActive: 1
      TrackingPoints/Z+/VRCContactReceiver.allowOthers: 0
      TrackingPoints/Z+/GameObject.m_IsActive: 1
      TrackingPoints/Z-/VRCContactReceiver.allowOthers: 0
      TrackingPoints/Z-/GameObject.m_IsActive: 1
    curves:
      # Park brake: hold 1 for the settle dwell, then release. The dwell IS this clip's length
      # (`seconds` above); the ancestor's stepped key at the clip end is approximated with a
      # flat-tangent hold key one frame before the drop.
      TrackingPoints/VRCPositionConstraint.Sources.source6.Weight: [ [0, 1], [0.9833333, 1], [1, 0] ]
      # Probe spread: coincident for one frame (the latch samples first), then the +/-0.5 cage.
      TrackingPoints/X+/Transform.m_LocalPosition.x: [ [0, 0], [0.016666668, 0.5] ]
      TrackingPoints/X-/Transform.m_LocalPosition.x: [ [0, 0], [0.016666668, -0.5] ]
      TrackingPoints/Y+/Transform.m_LocalPosition.y: [ [0, 0], [0.016666668, 0.5] ]
      TrackingPoints/Y-/Transform.m_LocalPosition.y: [ [0, 0], [0.016666668, -0.5] ]
      TrackingPoints/Z+/Transform.m_LocalPosition.z: [ [0, 0], [0.016666668, 0.5] ]
      TrackingPoints/Z-/Transform.m_LocalPosition.z: [ [0, 0], [0.016666668, -0.5] ]

  # Crawler DBT leaves: each writes exactly its probe's source weight; the direct-tree weight
  # (raw proximity) scales it, and the constraint normalizes by the weight sum.
  crawl_xp: { set: { TrackingPoints/VRCPositionConstraint.Sources.source0.Weight: 1 } }
  crawl_xn: { set: { TrackingPoints/VRCPositionConstraint.Sources.source1.Weight: 1 } }
  crawl_yp: { set: { TrackingPoints/VRCPositionConstraint.Sources.source2.Weight: 1 } }
  crawl_yn: { set: { TrackingPoints/VRCPositionConstraint.Sources.source3.Weight: 1 } }
  crawl_zp: { set: { TrackingPoints/VRCPositionConstraint.Sources.source4.Weight: 1 } }
  crawl_zn: { set: { TrackingPoints/VRCPositionConstraint.Sources.source5.Weight: 1 } }
